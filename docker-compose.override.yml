# Local Windows overrides: remap ports that fall inside Hyper-V reserved
# ranges (see `netsh interface ipv4 show excludedportrange protocol=tcp`).
# Container-internal ports stay unchanged so service-to-service traffic on
# the docker network keeps working; only the host-side bindings are moved.
name: azcspm

# Anchor for the read-only bind-mounts that overlay AzCSPM rebrand and
# new compliance frameworks onto the prebuilt prowler-api image. The
# venv path is fixed in the upstream image (poetry installs editable at a
# deterministic location), so overlaying source files here propagates to
# every container that imports the `prowler` package (api, worker, beat).
x-azcspm-overlays: &azcspm-overlays
  - type: bind
    source: ./prowler/compliance/aws/cis_controls_v8_aws.json
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/compliance/aws/cis_controls_v8_aws.json
    read_only: true
  - type: bind
    source: ./prowler/compliance/aws/az_data_sovereignty_aws.json
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/compliance/aws/az_data_sovereignty_aws.json
    read_only: true
  - type: bind
    source: ./ui-overrides/prowler-compliance/prowler_threatscore_aws.json
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/compliance/aws/prowler_threatscore_aws.json
    read_only: true
  - type: bind
    source: ./ui-overrides/prowler-outputs/ocsf/ocsf.py
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/lib/outputs/ocsf/ocsf.py
    read_only: true
  - type: bind
    source: ./ui-overrides/prowler-outputs/asff/asff.py
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/lib/outputs/asff/asff.py
    read_only: true
  - type: bind
    source: ./ui-overrides/prowler-outputs/html/html.py
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/lib/outputs/html/html.py
    read_only: true
  - type: bind
    source: ./ui-overrides/prowler-config/config.py
    target: /home/prowler/.cache/pypoetry/virtualenvs/prowler-api-NnJNioq7-py3.12/src/prowler/prowler/config/config.py
    read_only: true

services:
  # API container keeps listening on 8080 internally (the prebuilt UI image
  # has `prowler-api:8080` baked into its NEXT_PUBLIC_API_BASE_URL bundle),
  # but we publish it on host port 9080 because 8080 is taken by Windsurf.
  api:
    ports: !override
      - "9080:8080"
    volumes: *azcspm-overlays

  # Build UI from local sources so the AzCSPM rebrand (logo + copy) is
  # applied. The official prowlercloud/prowler-ui image bakes Prowler
  # branding (and NEXT_PUBLIC_API_BASE_URL) at build time, so we replace it
  # with a local build that picks up our edits.
  ui:
    image: !reset null
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_BASE_URL: http://prowler-api:8080/api/v1
        NEXT_PUBLIC_API_DOCS_URL: http://prowler-api:8080/api/v1/docs
        NEXT_PUBLIC_PROWLER_RELEASE_VERSION: AzCSPM

  mcp-server:
    ports: !override
      - "18000:8000"
  neo4j:
    ports: !override
      - "17687:7687"

  # Reduce Celery worker concurrency from default (CPU count = 16) to 4 so
  # the prowler scan does not OOM-kill the worker on machines with limited
  # Docker memory. Also limit prefetch so tasks aren't hoarded.
  worker:
    volumes: *azcspm-overlays
    entrypoint: !override
      - "sh"
      - "-c"
      - >-
        cd /home/prowler/backend &&
        poetry run python -m celery -A config.celery worker
        -n "$(python3 -c 'import uuid; print(uuid.uuid4().hex)')@$(hostname)"
        -l "${DJANGO_LOGGING_LEVEL:-info}"
        -Q celery,scans,scan-reports,deletion,backfill,overview,integrations,compliance,attack-paths-scans
        -E
        --concurrency=4
        --max-tasks-per-child=1
        --prefetch-multiplier=1

  worker-beat:
    volumes: *azcspm-overlays
